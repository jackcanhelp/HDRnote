// session 期間把密碼存在 sessionStorage（分頁關閉自動清除）
let SESSION_PW = sessionStorage.getItem('hdr_pw') || '';

const storage = {
  // 取得病人資料（帶密碼 header）
  getPatients: async () => {
    if (!SESSION_PW) return null;
    try {
      const r = await fetch('/api/patients', { headers: { 'X-Password': SESSION_PW } });
      if (r.ok) return await r.json();
      if (r.status === 401) storage.clearSession();
    } catch {}
    return null;
  },
  // 儲存病人資料
  savePatients: async (data) => {
    if (!SESSION_PW) return;
    try {
      await fetch('/api/patients', {
        method: 'POST',
        headers: { 'X-Password': SESSION_PW, 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
    } catch {}
  },
  // 驗證密碼（問 server），回傳 {ok, online}
  verifyPassword: async (pw) => {
    try {
      const r = await fetch('/api/patients', { headers: { 'X-Password': pw } });
      return { ok: r.status !== 401, online: true };
    } catch {
      return { ok: false, online: false };
    }
  },
  setSession: (pw) => { SESSION_PW = pw; sessionStorage.setItem('hdr_pw', pw); },
  clearSession: () => { SESSION_PW = ''; sessionStorage.removeItem('hdr_pw'); },
};

            <h1 className="text-2xl font-bold text-gray-800">洗腎室系統</h1>
            <p className="text-gray-500 text-sm mt-1">請輸入存取密碼</p>
          </div>
          <div className="mb-4">
            <input
              type="password"
              value={pwInput}
              onChange={e=>{ setPwInput(e.target.value); setPwError(''); }}
              onKeyPress={e=>e.key==='Enter'&&handleUnlock()}
              className={`w-full p-4 text-center text-xl tracking-widest border-2 rounded-xl focus:outline-none ${pwError==='wrong'?'border-red-400 bg-red-50':pwError==='offline'?'border-yellow-400 bg-yellow-50':'border-gray-200 focus:border-blue-400'}`}
              placeholder="••••••••••"
              autoFocus
              disabled={pwChecking}
            />
            {pwError==='wrong'   && <p className="text-red-500 text-sm text-center mt-2">密碼錯誤，請再試一次</p>}
            {pwError==='offline' && <p className="text-yellow-600 text-sm text-center mt-2">⚠️ 無法連線至伺服器<br/>請確認已執行 start.bat</p>}
          </div>
          <button onClick={handleUnlock} disabled={pwChecking} className="w-full bg-blue-600 text-white py-4 rounded-xl text-lg font-semibold hover:bg-blue-700 active:bg-blue-800 transition-colors disabled:bg-gray-400">
            {pwChecking ? '驗證中...' : '進入系統'}
          </button>
        </div>
      </div>
    );
  }

  // ===== SCANNER VIEW =====
  if (currentView==='scanner') {
    return (
      <div className="min-h-screen bg-gray-50 p-4">
        <div className="max-w-md mx-auto">
          <div className="bg-white rounded-lg shadow-lg p-6">
            <div className="text-center mb-6">
              <div className="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <Camera className="text-blue-600" size={40} />
              </div>
              <h2 className="text-xl font-bold text-gray-800 mb-2">掃描病人QR Code</h2>
              <div className="flex items-center justify-center space-x-2 mt-3">
                <p className="text-sm text-blue-600">歡迎回來，{currentUser?.name}</p>
                <ConnectionStatus />
              </div>
            </div>
            <ErrorAlert />
            {!qrScannerActive ? (
              <div>
                {loading&&<LoadingSpinner />}
                <div className="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center mb-6">
                  <Camera className="text-gray-400 mx-auto mb-2" size={48} />
                  <p className="text-gray-500 mb-4">準備掃描QR Code</p>
                  <button onClick={startCamera} disabled={loading} className="bg-blue-600 text-white px-6 py-3 rounded-md hover:bg-blue-700 disabled:bg-gray-400 flex items-center mx-auto mb-3">
                    <Camera className="mr-2" size={20} />{loading?'啟動中...':'開啟相機掃描'}
                  </button>
                  <button onClick={handleManualInput} className="bg-gray-600 text-white px-6 py-2 rounded-md hover:bg-gray-700 flex items-center mx-auto text-sm">
                    <Edit3 className="mr-2" size={16} />手動輸入病歷號
                  </button>
                </div>
              </div>
            ) : (
              <div className="mb-6">
                <div className="relative bg-black rounded-lg overflow-hidden">
                  <video ref={videoRef} className="w-full h-64 object-cover" playsInline muted />
                  <canvas ref={canvasRef} className="hidden" />
                  <div className="absolute inset-0 flex items-center justify-center">
                    <div className="border-2 border-red-500 w-48 h-48 bg-transparent relative">
                      <div className="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-red-500"></div>
                      <div className="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-red-500"></div>
                      <div className="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-red-500"></div>
                      <div className="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-red-500"></div>
                      {isScanning&&<div className="absolute inset-0 flex items-center justify-center"><Zap className="text-red-500 animate-pulse" size={24} /></div>}
                    </div>
                  </div>
                  <div className="absolute bottom-4 left-4 right-4 bg-black bg-opacity-70 text-white p-3 rounded">
                    <div className="flex items-center justify-between">
                      <div className="flex items-center">
                        <div className={`w-3 h-3 rounded-full mr-2 ${isScanning?'bg-green-500 animate-pulse':'bg-yellow-500'}`}></div>
                        <span className="text-sm">{isScanning?'正在掃描QR Code...':'正在準備掃描...'}</span>
                      </div>
                      <button onClick={stopCamera} className="bg-red-600 text-white px-3 py-1 rounded text-sm">停止</button>
                    </div>
                  </div>
                </div>
              </div>
            )}
            <div className="space-y-2">
              <div className="flex space-x-2 mb-4">
                <button onClick={()=>setCurrentView('patientList')} className="flex-1 bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 flex items-center justify-center">
                  <List className="mr-2" size={16} />病人列表
                </button>
                <button onClick={handleManualInput} className="flex-1 bg-orange-600 text-white py-2 px-4 rounded-md hover:bg-orange-700 flex items-center justify-center">
                  <Search className="mr-2" size={16} />快速查找
                </button>
              </div>
              <div className="border border-amber-200 bg-amber-50 rounded-lg p-3">
                <p className="text-xs font-semibold text-amber-700 mb-2 uppercase tracking-wide">示範病患</p>
                <div className="space-y-2">
                  {patients.filter(p=>p.bed==='示範').map(patient=>{
                    const shiftColor = patient.shift==='早' ? 'bg-yellow-100 text-yellow-800' : patient.shift==='中' ? 'bg-green-100 text-green-800' : patient.shift==='晚' ? 'bg-indigo-100 text-indigo-800' : 'bg-gray-100 text-gray-600';
                    const qwLabel = patient.qw==='QW135' ? '週一三五' : patient.qw==='QW246' ? '週二四六' : '';
                    const today = new Date().toISOString().split('T')[0];
                    const hasTodayTodo = (patient.todos||[]).some(t=>t.date===today);
                    return (
                      <div key={patient.patientId} className="bg-white rounded-lg p-3 border-l-4 border-amber-400">
                        <div className="flex items-center justify-between">
                          <div className="flex-1 cursor-pointer hover:bg-amber-50 px-1 rounded transition-colors" onClick={()=>handleSelectPatient(patient)}>
                            <div className="flex items-center space-x-2 flex-wrap gap-y-0.5">
                              <h3 className="font-semibold text-gray-800 text-sm">{patient.name}</h3>
                              {patient.frequency&&<span className="text-xs bg-blue-50 text-blue-700 px-2 py-0.5 rounded">週{patient.frequency}次</span>}
                              {patient.isActive===false&&<span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded">已轉出</span>}
                            </div>
                            <div className="mt-0.5 space-y-0.5 text-sm text-gray-600">
                              <div className="flex items-center flex-wrap gap-x-2 gap-y-0.5">
                                {patient.shift&&<span className={`text-xs px-2 py-0.5 rounded font-medium ${shiftColor}`}>{qwLabel} {patient.shift}班</span>}
                              </div>
                              {(patient.accessType||patient.dw)&&<div className="flex items-center gap-x-3 text-xs text-gray-500"><span>通路: {patient.accessSide}{patient.accessLocation} {patient.accessType}</span><span>乾重: {patient.dw||0}kg</span></div>}
                              {hasAllergy(patient.drugAllergies)&&<div className="flex items-center text-red-600 font-medium text-xs"><AlertCircle size={12} className="mr-1" />過敏: {patient.drugAllergies}</div>}
                              <div className="flex items-center space-x-3 text-xs">
                                {patient.medications&&patient.medications.length>0&&<span className="flex items-center text-blue-600"><Pill size={12} className="mr-1" />{patient.medications.length} 種藥</span>}
                                {patient.dialysisRecords&&patient.dialysisRecords.length>0&&<span className="flex items-center text-green-600"><Activity size={12} className="mr-1" />{patient.dialysisRecords.length} 次記錄</span>}
                                {hasTodayTodo&&<span className="flex items-center text-orange-500 font-medium"><Bell size={12} className="mr-1" />今日待辦</span>}
                              </div>
                            </div>
                          </div>
                          <div className="flex flex-col space-y-1 ml-2">
                            <div className="flex space-x-1">
                              <button onClick={()=>handleMedicationManagement(patient)} className="p-2 text-purple-600 hover:bg-purple-50 rounded border border-purple-200" title="藥物管理"><Pill size={14} /></button>
                              <button onClick={()=>handleDialysisRecords(patient)} className="p-2 text-green-600 hover:bg-green-50 rounded border border-green-200" title="透析紀錄"><Activity size={14} /></button>
                            </div>
                            <div className="flex space-x-1">
                              <button onClick={()=>handleLabReport(patient)} className="p-2 text-teal-600 hover:bg-teal-50 rounded border border-teal-200" title="抽血報告"><TrendingUp size={14} /></button>
                              <button onClick={()=>handleReminders(patient)} className="p-2 text-orange-600 hover:bg-orange-50 rounded border border-orange-200" title="提醒事項"><Bell size={14} /></button>
                              <button onClick={()=>{setCurrentPatient(patient);setIsNewPatient(false);setCurrentView('background');}} className="p-2 text-blue-600 hover:bg-blue-50 rounded border border-blue-200" title="背景資料"><FileText size={14} /></button>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
            <button onClick={()=>{ storage.clearSession(); setAppUnlocked(false); setIsLoggedIn(false); setCurrentUser(null); setPatients([]); setIsInitialized(false); setCurrentView('scanner'); }} className="w-full mt-4 text-gray-600 hover:text-gray-800 py-2">鎖定（登出）</button>
          </div>
        </div>
      </div>
    );
  }

  // ===== DIALYSIS PROCESS VIEW =====
  if (currentView==='dialysisProcess'&&selectedDialysisRecord) {
    const processRecords=selectedDialysisRecord.processRecords||[];
    const timeOptions=generateTimeOptions();
    return (
      <div className="min-h-screen bg-gray-50">
        <div className="bg-white shadow-sm border-b p-4">
          <div className="flex items-center justify-between">
            <button onClick={()=>{ setCurrentView('dialysisRecords'); setViewingHistoryDate(''); setTimeMachineMode(false); setCustomTime(''); }} className="text-blue-600 hover:bg-blue-50 p-2 rounded"><X size={20} /></button>
            <div className="text-center"><h1 className="text-lg font-semibold">透析過程紀錄</h1><ConnectionStatus /></div>
            <div className="flex space-x-2">
              <button onClick={()=>setTimeMachineMode(!timeMachineMode)} className={`p-2 rounded border ${timeMachineMode?'bg-purple-100 text-purple-600 border-purple-300':'text-purple-600 hover:bg-purple-50 border-purple-200'}`} title="時光機"><Clock size={20} /></button>
              <button onClick={()=>addNewProcessRecord()} className="text-green-600 hover:bg-green-50 p-2 rounded border border-green-200" title="新增當前時間記錄"><Plus size={20} /></button>
            </div>
          </div>
        </div>
        <div className="p-4 max-w-4xl mx-auto">
          <div className="bg-white rounded-lg shadow-sm p-4 mb-4">
            <div className="flex items-center space-x-3">
              <TrendingUp className="text-green-600" size={24} />
              <div>
                <h3 className="font-semibold text-gray-800">{selectedPatientForDialysis.name}</h3>
                <p className="text-sm text-gray-600">透析日期: {selectedDialysisRecord.date} | 時間: {selectedDialysisRecord.startTime} - {selectedDialysisRecord.endTime}</p>
              </div>
            </div>
          </div>
          <ErrorAlert />

          {timeMachineMode&&(
            <div className="bg-purple-50 border border-purple-200 rounded-lg p-6 mb-4">
              <div className="flex items-center space-x-3 mb-4"><Clock className="text-purple-600" size={24} /><h4 className="font-semibold text-purple-800">時光機 - 回到特定時間點</h4></div>
              <div className="mb-4 bg-white p-4 rounded border border-purple-300">
                <h5 className="font-medium text-purple-700 mb-3">自訂時間記錄</h5>
                <div className="flex items-center space-x-3">
                  <input type="time" value={customTime} onChange={e=>setCustomTime(e.target.value)} className="p-2 border border-purple-300 rounded" min={selectedDialysisRecord.startTime} max={selectedDialysisRecord.endTime} />
                  <button onClick={addCustomTimeRecord} className="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">新增記錄</button>
                </div>
                <p className="text-xs text-purple-600 mt-2">時間範圍: {selectedDialysisRecord.startTime} - {selectedDialysisRecord.endTime}</p>
              </div>
              <div className="grid grid-cols-4 md:grid-cols-6 gap-2 mb-4">
                {timeOptions.map(time=>{ const has=processRecords.some(pr=>pr.time===time); return (
                  <button key={time} onClick={()=>addNewProcessRecord(time)} className={`p-3 rounded text-sm font-medium ${has?'bg-green-100 text-green-800 border border-green-300 cursor-not-allowed':'bg-white text-purple-600 border border-purple-300 hover:bg-purple-100'}`} disabled={has}>
                    <div className="font-bold">{time}</div>
                    <div className="text-xs mt-1">{has?'✅ 已記錄':'點擊補記'}</div>
                  </button>
                );})}
              </div>
              <button onClick={()=>setTimeMachineMode(false)} className="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">關閉時光機</button>
            </div>
          )}

          {editingProcessRecord&&(
            <div className="bg-white rounded-lg shadow-sm p-6 mb-4 border-l-4 border-green-500">
              <h4 className="font-semibold mb-4 text-gray-800">{isAddingProcessRecord?'新增':'編輯'}透析過程記錄</h4>
              <div className="grid grid-cols-1 gap-6 mb-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">記錄時間 *</label>
                  <input type="time" value={editingProcessRecord.time} onChange={e=>updateProcessRecordField('time',e.target.value)} className="w-full p-3 border border-gray-300 rounded-md text-lg" />
                </div>
                <div className="bg-gray-50 p-6 rounded-lg">
                  <h5 className="text-lg font-semibold mb-4 text-center text-gray-800">生理參數設定</h5>
                  <div className="grid grid-cols-2 gap-4 mb-6">
                    <ScrollSelector label="收縮壓" value={editingProcessRecord.systolicBP} onChange={v=>updateProcessRecordField('systolicBP',v)} min={80} max={200} step={1} unit="mmHg" color="red" />
                    <ScrollSelector label="舒張壓" value={editingProcessRecord.diastolicBP} onChange={v=>updateProcessRecordField('diastolicBP',v)} min={40} max={120} step={1} unit="mmHg" color="red" />
                  </div>
                  <div className="grid grid-cols-3 gap-4">
                    <ScrollSelector label="心跳" value={editingProcessRecord.heartRate} onChange={v=>updateProcessRecordField('heartRate',v)} min={40} max={150} step={1} unit="/min" color="pink" />
                    <ScrollSelector label="血流量" value={editingProcessRecord.bloodFlow} onChange={v=>updateProcessRecordField('bloodFlow',v)} min={150} max={400} step={10} unit="ml/min" color="orange" />
                    <ScrollSelector label="脫水速度" value={editingProcessRecord.fluidRemovalRate} onChange={v=>updateProcessRecordField('fluidRemovalRate',v)} min={0.0} max={2.0} step={0.1} unit="L/hr" color="blue" />
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">特殊處置/備註</label>
                  <textarea value={editingProcessRecord.specialNote} onChange={e=>updateProcessRecordField('specialNote',e.target.value)} className="w-full p-3 border border-gray-300 rounded-md resize-none" rows="3" placeholder="記錄任何特殊處置、藥物給予、病人反應等" />
                </div>
              </div>
              <div className="flex space-x-3">
                <button onClick={saveProcessRecord} className="bg-green-600 text-white px-6 py-3 rounded-md hover:bg-green-700 flex items-center text-lg"><Save size={20} className="mr-2" />儲存記錄</button>
                <button onClick={()=>{ setEditingProcessRecord(null); setIsAddingProcessRecord(false); }} className="bg-gray-600 text-white px-6 py-3 rounded-md hover:bg-gray-700 text-lg">取消</button>
              </div>
            </div>
          )}

          {processRecords.length>0 ? (
            <div className="space-y-6">
              <div className="bg-white rounded-lg shadow-sm overflow-hidden">
                <div className="p-4 bg-gray-50 border-b"><h4 className="font-semibold text-gray-800 flex items-center"><Table className="mr-2" size={20} />透析過程監測記錄表</h4></div>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-gray-100 border-b">
                      <tr>
                        <th className="text-left py-3 px-3 font-medium text-gray-700 min-w-16">時間</th>
                        <th className="text-center py-3 px-3 font-medium text-gray-700 min-w-20">收縮壓<br/><span className="text-xs font-normal">(mmHg)</span></th>
                        <th className="text-center py-3 px-3 font-medium text-gray-700 min-w-20">舒張壓<br/><span className="text-xs font-normal">(mmHg)</span></th>
                        <th className="text-center py-3 px-3 font-medium text-gray-700 min-w-16">心跳<br/><span className="text-xs font-normal">(/min)</span></th>
                        <th className="text-center py-3 px-3 font-medium text-gray-700 min-w-20">血流量<br/><span className="text-xs font-normal">(ml/min)</span></th>
                        <th className="text-center py-3 px-3 font-medium text-gray-700 min-w-20">脫水速度<br/><span className="text-xs font-normal">(L/hr)</span></th>
                        <th className="text-center py-3 px-2 font-medium text-gray-700 min-w-16">操作</th>
                      </tr>
                    </thead>
                    <tbody>
                      {processRecords.sort((a,b)=>a.time.localeCompare(b.time)).map((record,index)=>(
                        <tr key={record.id} className={`border-b hover:bg-gray-50 ${index%2===0?'bg-white':'bg-gray-50'}`}>
                          <td className="py-3 px-3"><div className="font-medium text-gray-800">{record.time}</div></td>
                          <td className="py-3 px-3 text-center">
                            <span className={`inline-block px-2 py-1 rounded text-xs font-medium ${record.systolicBP>=160?'bg-red-100 text-red-800':record.systolicBP>=140?'bg-orange-100 text-orange-800':record.systolicBP>=90?'bg-green-100 text-green-800':'bg-blue-100 text-blue-800'}`}>{record.systolicBP}</span>
                          </td>
                          <td className="py-3 px-3 text-center">
                            <span className={`inline-block px-2 py-1 rounded text-xs font-medium ${record.diastolicBP>=100?'bg-red-100 text-red-800':record.diastolicBP>=90?'bg-orange-100 text-orange-800':record.diastolicBP>=60?'bg-green-100 text-green-800':'bg-blue-100 text-blue-800'}`}>{record.diastolicBP}</span>
                          </td>
                          <td className="py-3 px-3 text-center">
                            <span className={`inline-block px-2 py-1 rounded text-xs font-medium ${record.heartRate>=100?'bg-red-100 text-red-800':record.heartRate>=60?'bg-green-100 text-green-800':'bg-blue-100 text-blue-800'}`}>{record.heartRate}</span>
                          </td>
                          <td className="py-3 px-3 text-center"><span className="inline-block bg-orange-100 text-orange-800 px-2 py-1 rounded text-xs font-medium">{record.bloodFlow}</span></td>
                          <td className="py-3 px-3 text-center">
                            <span className={`inline-block px-2 py-1 rounded text-xs font-medium ${record.fluidRemovalRate>=0.8?'bg-red-100 text-red-800':record.fluidRemovalRate>=0.5?'bg-orange-100 text-orange-800':'bg-blue-100 text-blue-800'}`}>{record.fluidRemovalRate}</span>
                          </td>
                          <td className="py-3 px-2">
                            <div className="flex justify-center space-x-1">
                              <button onClick={()=>{ let r={...record}; r.systolicBP=r.systolicBP||140; r.diastolicBP=r.diastolicBP||90; r.heartRate=r.heartRate||80; r.bloodFlow=r.bloodFlow||280; r.fluidRemovalRate=r.fluidRemovalRate||0.5; setEditingProcessRecord(r); setIsAddingProcessRecord(false); }} className="p-1 text-blue-600 hover:bg-blue-50 rounded"><Edit3 size={12} /></button>
                              <button onClick={()=>deleteProcessRecord(record.id)} className="p-1 text-red-600 hover:bg-red-50 rounded"><Trash2 size={12} /></button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
              <div className="bg-white rounded-lg shadow-sm p-6">
                <h4 className="font-semibold mb-4 text-gray-800 flex items-center"><FileText className="mr-2" size={20} />護理記錄</h4>
                <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                  <div className="text-sm text-gray-700 leading-relaxed whitespace-pre-line">
                    {(()=>{ const n=generateNursingNotes(processRecords); if(!n) return '無特殊處置記錄'; return n.split('、 ').filter(x=>x.trim()).map(x=>x.trim()+(x.endsWith('。')?'':'。')).join('\n'); })()}
                  </div>
                </div>
                <div className="mt-3 text-xs text-gray-500"><p>透析病人: {selectedPatientForDialysis.name} | 透析日期: {selectedDialysisRecord.date}</p></div>
              </div>
            </div>
          ) : (
            <div className="bg-white rounded-lg shadow-sm p-8 text-center">
              <Table className="text-gray-400 mx-auto mb-4" size={48} />
              <p className="text-gray-500 mb-4">尚未記錄透析過程監測</p>
              <div className="space-y-2">
                <button onClick={()=>addNewProcessRecord()} className="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 flex items-center mx-auto"><Plus size={16} className="mr-2" />新增當前時間記錄</button>
                <button onClick={()=>setTimeMachineMode(true)} className="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700 flex items-center mx-auto"><Clock size={16} className="mr-2" />使用時光機補記</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ===== DIALYSIS RECORDS VIEW =====
  if (currentView==='dialysisRecords'&&selectedPatientForDialysis) {
    const dialysisRecords=selectedPatientForDialysis.dialysisRecords||[];
    return (
      <div className="min-h-screen bg-gray-50">
        <div className="bg-white shadow-sm border-b p-4">
          <div className="flex items-center justify-between">
            <button onClick={()=>setCurrentView('patientList')} className="text-blue-600 hover:bg-blue-50 p-2 rounded"><X size={20} /></button>
            <div className="text-center"><h1 className="text-lg font-semibold">透析紀錄</h1><ConnectionStatus /></div>
            <button onClick={addNewDialysisRecord} className="text-green-600 hover:bg-green-50 p-2 rounded"><Plus size={20} /></button>
          </div>
        </div>
        <div className="p-4 max-w-4xl mx-auto">
          <div className="bg-white rounded-lg shadow-sm p-4 mb-4">
            <div className="flex items-center space-x-3">
              <Activity className="text-green-600" size={24} />
              <div><h3 className="font-semibold text-gray-800">{selectedPatientForDialysis.name}</h3><p className="text-sm text-gray-600">病歷號: {selectedPatientForDialysis.patientId} | 透析頻率: 週{selectedPatientForDialysis.frequency}次</p></div>
            </div>
          </div>
          <ErrorAlert />

          {editingDialysisRecord&&(

                  <div key={field}>
                    <label className="block text-sm font-medium text-gray-700 mb-1">{lbl}</label>
                    {field==='startTime'||field==='endTime' ? (
                      <input type="time" value={editingDialysisRecord[field]} onChange={e=>updateDialysisRecordField(field,e.target.value)} className="w-full p-2 border border-gray-300 rounded-md" />
                    ) : (
                      <input type={type} step={['duration','preWeight','clothingWeight','postWeight','dryWeight','fluidRemoval','temperature'].includes(field)?'0.1':'1'} value={editingDialysisRecord[field]} onChange={e=>updateDialysisRecordField(field,type==='number'?(field==='duration'||field==='preWeight'||field==='clothingWeight'||field==='postWeight'||field==='dryWeight'||field==='fluidRemoval'||field==='temperature'?parseFloat(e.target.value)||0:parseInt(e.target.value)||0):e.target.value)} className="w-full p-2 border border-gray-300 rounded-md" />

                  <label className="block text-sm font-medium text-gray-700 mb-1">血管通路</label>
                  <div className="flex space-x-1">
                    <select value={editingDialysisRecord.accessSide} onChange={e=>updateDialysisRecordField('accessSide',e.target.value)} className="w-16 p-2 border border-gray-300 rounded-md text-xs"><option>左</option><option>右</option></select>
                    <select value={editingDialysisRecord.accessLocation} onChange={e=>updateDialysisRecordField('accessLocation',e.target.value)} className="flex-1 p-2 border border-gray-300 rounded-md text-xs"><option>前臂</option><option>上臂</option><option>肩部</option></select>
                    <select value={editingDialysisRecord.accessType} onChange={e=>updateDialysisRecordField('accessType',e.target.value)} className="w-20 p-2 border border-gray-300 rounded-md text-xs"><option>AVF</option><option>AVG</option><option>Permcath</option></select>
                  </div>
                </div>
              </div>
              <div className="mb-4">
                <label className="block text-sm font-medium text-gray-700 mb-1">備註</label>
                <textarea value={editingDialysisRecord.notes} onChange={e=>updateDialysisRecordField('notes',e.target.value)} className="w-full p-2 border border-gray-300 rounded-md resize-none" rows="3" />

              <div className="flex space-x-3">
                <button onClick={saveDialysisRecord} className="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 flex items-center"><Save size={16} className="mr-1" />儲存</button>

              </div>
            </div>
          )}

          {dialysisRecords.length>0 ? (
            <div className="space-y-4">
              {dialysisRecords.map(record=>(
                <div key={record.id} className="bg-white rounded-lg shadow-sm p-6">
                  <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center space-x-3 flex-wrap gap-y-1">
                      <h4 className="font-semibold text-gray-800">{record.date}</h4>
                      <span className="text-sm bg-blue-100 text-blue-800 px-2 py-1 rounded">{record.startTime} - {record.endTime} ({record.duration}小時)</span>
                      <span className="text-sm bg-purple-100 text-purple-800 px-2 py-1 rounded">{record.artificialKidney}</span>
                      {record.processRecords&&record.processRecords.length>0&&<span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">過程記錄 {record.processRecords.length} 筆</span>}
                    </div>
                    <div className="flex space-x-2">
                      <button onClick={()=>handleDialysisProcess(record)} className="p-2 text-green-600 hover:bg-green-50 rounded border border-green-200" title="透析過程紀錄"><TrendingUp size={16} /></button>

                    {[['透析前體重',`${record.preWeight} kg`,'gray'],['透析後體重',`${record.postWeight} kg`,'gray'],['UF脫水量',`${record.fluidRemoval} L`,'blue'],['乾體重',`${record.dryWeight} kg`,'green']].map(([lbl,val,c])=>(
                      <div key={lbl} className={`bg-${c}-50 p-3 rounded`}><p className={`text-xs text-${c}-600 mb-1`}>{lbl}</p><p className={`font-semibold text-${c}-800`}>{val}</p></div>
                    ))}
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                    {[['血流量',`${record.bloodFlow} ml/min`,'orange'],['肝素劑量',`${record.heparinDose} IU`,'red'],['血管通路',`${record.accessSide}${record.accessLocation} ${record.accessType}`,'indigo'],['體溫',`${record.temperature} °C`,'pink']].map(([lbl,val,c])=>(
                      <div key={lbl} className={`bg-${c}-50 p-3 rounded`}><p className={`text-xs text-${c}-600 mb-1`}>{lbl}</p><p className={`font-semibold text-${c}-800`}>{val}</p></div>
                    ))}

                  {record.notes&&<div className="bg-yellow-50 p-3 rounded border-l-4 border-yellow-400"><p className="text-sm font-medium text-yellow-800 mb-1">備註</p><p className="text-yellow-700">{record.notes}</p></div>}
                </div>
              ))}
            </div>
          ) : (
            <div className="bg-white rounded-lg shadow-sm p-8 text-center">
              <Activity className="text-gray-400 mx-auto mb-4" size={48} />
              <p className="text-gray-500 mb-4">目前沒有透析紀錄</p>
              <button onClick={addNewDialysisRecord} className="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 flex items-center mx-auto"><Plus size={16} className="mr-2" />新增第一筆透析紀錄</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ===== REMINDERS VIEW =====
  if (currentView==='reminders'&&selectedPatientForReminders) {
    return (
      <div className="min-h-screen bg-gray-50">
        <div className="bg-white shadow-sm border-b p-4">
          <div className="flex items-center justify-between">
            <button onClick={()=>setCurrentView('patientList')} className="text-blue-600 hover:bg-blue-50 p-2 rounded"><X size={20} /></button>
            <div className="text-center"><h1 className="text-lg font-semibold">提醒便條</h1><ConnectionStatus /></div>
            <div className="flex space-x-2">
              {editingNotes ? <button onClick={saveReminders} className="text-green-600 hover:bg-green-50 p-2 rounded border border-green-200"><Save size={20} /></button>
              : <button onClick={()=>setEditingNotes(true)} className="text-blue-600 hover:bg-blue-50 p-2 rounded border border-blue-200"><Edit3 size={20} /></button>}
            </div>
          </div>
        </div>
        <div className="p-4 max-w-2xl mx-auto">
          <div className="bg-white rounded-lg shadow-sm p-4 mb-4">
            <div className="flex items-center space-x-3"><Bell className="text-orange-600" size={24} /><div><h3 className="font-semibold text-gray-800">{selectedPatientForReminders.name}</h3><p className="text-sm text-gray-600">病歷號: {selectedPatientForReminders.patientId}</p></div></div>
          </div>
          <ErrorAlert />
          {/* 待辦事項區 */}

            <div className="bg-orange-50 px-4 py-3 border-b border-orange-100 rounded-t-lg flex items-center justify-between">

              <span className="text-xs text-orange-600">{(selectedPatientForReminders.todos||[]).length} 項</span>
            </div>
            <div className="p-4">
              {/* 快速新增 */}
              <div className="flex space-x-2 mb-4">
                <input type="date" value={todoDate} onChange={e=>setTodoDate(e.target.value)}

                <input type="text" value={todoInput} onChange={e=>setTodoInput(e.target.value)}
                  onKeyPress={e=>e.key==='Enter'&&addTodo()}

                <button onClick={addTodo} className="bg-orange-500 text-white px-3 py-1.5 rounded hover:bg-orange-600 flex items-center text-sm"><Plus size={16} /></button>
              </div>
              {/* 待辦列表 */}
              {(selectedPatientForReminders.todos||[]).length===0 ? (
                <p className="text-gray-400 text-sm text-center py-4">尚無待辦事項</p>
              ) : (
                <div className="space-y-2">
                  {[...(selectedPatientForReminders.todos||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(todo=>{
                    const today2 = new Date().toISOString().split('T')[0];
                    const isToday = todo.date===today2;
                    const isPast = todo.date<today2;
                    return (
                      <div key={todo.id} className={`flex items-center space-x-3 p-2 rounded ${isToday?'bg-orange-50 border border-orange-200':isPast?'bg-gray-50 opacity-60':'bg-white border border-gray-100'}`}>
                        <span className={`text-xs font-medium px-2 py-0.5 rounded whitespace-nowrap ${isToday?'bg-orange-500 text-white':isPast?'bg-gray-300 text-gray-600':'bg-blue-100 text-blue-700'}`}>
                          {isToday?'今天':todo.date}
                        </span>
                        <span className="flex-1 text-sm text-gray-800">{todo.text}</span>
                        <button onClick={()=>deleteTodo(todo.id)} className="text-gray-400 hover:text-red-500 p-1"><X size={14} /></button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

              <div className="text-xs text-yellow-700">{editingNotes?'編輯中':'檢視'}</div>
            </div>

              {editingNotes ? (
                <div>
                  <textarea value={notesContent} onChange={e=>setNotesContent(e.target.value)}

                    placeholder="自由備註、注意事項..." style={{fontFamily:'serif',lineHeight:'28px'}} />
                  <div className="flex justify-end space-x-2 mt-2">
                    <button onClick={saveReminders} className="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 flex items-center text-sm"><Save size={14} className="mr-1" />儲存</button>
                    <button onClick={()=>{setEditingNotes(false);setNotesContent(selectedPatientForReminders.reminders||'');}} className="bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600 text-sm">取消</button>
                  </div>
                </div>
              ) : (
                <div>
                  <div className="min-h-32 p-2 text-gray-800 leading-relaxed whitespace-pre-line text-sm" style={{fontFamily:'serif',lineHeight:'28px'}}>
                    {notesContent||<span className="text-gray-400">點擊右上角編輯按鈕新增自由便條...</span>}
                  </div>
                  <div className="text-right mt-2">
                    <button onClick={()=>setEditingNotes(true)} className="bg-blue-600 text-white px-3 py-1.5 rounded-md hover:bg-blue-700 flex items-center text-sm ml-auto"><Edit3 size={14} className="mr-1" />編輯</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    );

  // ===== MEDICATION HISTORY VIEW =====
  if (currentView==='medicationHistory'&&selectedPatientForMeds) {
    const medications=selectedPatientForMeds.medications||[];
    const historyData=selectedPatientForMeds.medicationHistory||{};
    const yearHistory=historyData[selectedYear]||{};
    return (
      <div className="min-h-screen bg-gray-50">
        <div className="bg-white shadow-sm border-b p-4">
          <div className="flex items-center justify-between">
            <button onClick={()=>setCurrentView('medications')} className="text-blue-600 hover:bg-blue-50 p-2 rounded"><X size={20} /></button>
            <div className="text-center"><h1 className="text-lg font-semibold">藥物歷史紀錄</h1><ConnectionStatus /></div>
            <div></div>
          </div>
        </div>
        <div className="p-4 max-w-4xl mx-auto">
          <div className="bg-white rounded-lg shadow-sm p-4 mb-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center space-x-3"><Calendar className="text-purple-600" size={24} /><div><h3 className="font-semibold text-gray-800">{selectedPatientForMeds.name}</h3><p className="text-sm text-gray-600">病歷號: {selectedPatientForMeds.patientId}</p></div></div>
              <select value={selectedYear} onChange={e=>setSelectedYear(parseInt(e.target.value))} className="p-2 border border-gray-300 rounded text-sm">
                {getAvailableYears().map(y=><option key={y} value={y}>{y}年</option>)}
              </select>
            </div>

            <div className="bg-white rounded-lg shadow-sm overflow-hidden">

                      <th className="text-left py-3 px-4 font-medium text-gray-700 min-w-40">藥物名稱</th>
                      <th className="text-left py-3 px-3 font-medium text-gray-700">劑量</th>
                      {Array.from({length:12},(_,i)=><th key={i+1} className="text-center py-3 px-2 font-medium text-gray-700 min-w-12">{getMonthName(i+1)}</th>)}

                  </thead>

                    {medications.map((med,idx)=>{ const medH=yearHistory[med.id]||{}; return (
                      <tr key={med.id} className={`border-b hover:bg-gray-50 ${idx%2===0?'bg-white':'bg-gray-50'}`}>
                        <td className="py-3 px-4"><div className="font-medium text-gray-800">{med.drugName}</div><div className="text-xs text-gray-500">{med.hospital}</div></td>
                        <td className="py-3 px-3"><span className="text-gray-700">{med.dosage} {med.unit}</span></td>

                          <td key={m} className="py-3 px-2 text-center">
                            {isFuture ? <span className="text-gray-300">-</span> : (
                              <span className={`inline-flex items-center justify-center w-8 h-6 rounded text-xs font-bold ${status==='prescribed'?'bg-green-100 text-green-800':status==='remaining'?'bg-orange-100 text-orange-800':status==='discontinued'?'bg-red-100 text-red-800':'bg-gray-100 text-gray-400'}`}>
                                {status==='prescribed'?'✅':status==='remaining'?'🪣':status==='discontinued'?'DC':'-'}
                              </span>
                            )}
                          </td>
                        );})}
                      </tr>
                    );})}
                  </tbody>
                </table>
              </div>
              <div className="bg-gray-50 px-4 py-3 border-t">
                <div className="flex justify-between items-center text-sm">
                  <span className="text-gray-600">共 {medications.length} 種藥物 | {selectedYear}年度記錄</span>
                  <div className="flex space-x-4">
                    <span className="flex items-center"><span className="w-4 h-4 bg-green-100 text-green-800 rounded text-xs font-bold flex items-center justify-center mr-1">✅</span>已領立</span>
                    <span className="flex items-center"><span className="w-4 h-4 bg-orange-100 text-orange-800 rounded text-xs font-bold flex items-center justify-center mr-1">🪣</span>有餘藥</span>
                    <span className="flex items-center"><span className="w-4 h-4 bg-red-100 text-red-800 rounded text-xs font-bold flex items-center justify-center mr-1">DC</span>已停藥</span>
                  </div>
                </div>
              </div>
            </div>
          ) : (
            <div className="bg-white rounded-lg shadow-sm p-8 text-center"><Calendar className="text-gray-400 mx-auto mb-4" size={48} /><p className="text-gray-500">目前沒有藥物歷史紀錄</p></div>
          )}
        </div>
      </div>
    );

  // ===== MEDICATIONS VIEW =====
  if (currentView==='medications'&&selectedPatientForMeds) {
    const allMeds = selectedPatientForMeds.medications||[];
    const MED_TABS = [
      { key:'dialysis', label:'洗腎用藥', color:'purple' },
      { key:'internal', label:'內科用藥', color:'blue' },
      { key:'other',    label:'其他',     color:'gray' },
    ];
    const medications = allMeds.filter(m => (m.category||'dialysis') === medTab);
    return (
      <div className="min-h-screen bg-gray-50">
        <div className="bg-white shadow-sm border-b p-4">

            <div className="flex space-x-2">
              <button onClick={()=>setCurrentView('medicationHistory')} className="text-blue-600 hover:bg-blue-50 p-2 rounded border border-blue-200"><Calendar size={20} /></button>
              <button onClick={addNewMedication} className="text-green-600 hover:bg-green-50 p-2 rounded border border-green-200"><Plus size={20} /></button>
            </div>
          </div>
          {/* 頁籤 */}
          <div className="flex space-x-1 mt-3">
            {MED_TABS.map(tab => {
              const count = allMeds.filter(m=>(m.category||'dialysis')===tab.key).length;
              const active = medTab===tab.key;
              return (
                <button key={tab.key} onClick={()=>{setMedTab(tab.key);setEditingMed(null);setIsAddingMed(false);}}
                  className={`flex-1 py-2 text-sm font-medium rounded-t-lg border-b-2 transition-colors ${active?'border-purple-600 text-purple-700 bg-purple-50':'border-transparent text-gray-500 hover:text-gray-700 bg-white'}`}>
                  {tab.label}
                  {count>0&&<span className={`ml-1 text-xs px-1.5 py-0.5 rounded-full ${active?'bg-purple-200 text-purple-700':'bg-gray-100 text-gray-500'}`}>{count}</span>}
                </button>

        </div>

          <div className="bg-white rounded-lg shadow-sm p-4 mb-4">

            {selectedPatientForMeds.drugAllergies&&selectedPatientForMeds.drugAllergies!=='無已知過敏'&&!isEditingAllergy&&(
              <div className="mt-3 p-2 bg-red-50 border border-red-200 rounded">
                <div className="flex items-center justify-between"><p className="text-red-700 text-sm font-medium">⚠️ 藥物過敏: {selectedPatientForMeds.drugAllergies}</p><button onClick={()=>setIsEditingAllergy(true)} className="text-red-600 hover:bg-red-100 p-1 rounded"><Edit3 size={14} /></button></div>
              </div>
            )}
            {(!selectedPatientForMeds.drugAllergies||selectedPatientForMeds.drugAllergies==='無已知過敏')&&!isEditingAllergy&&(
              <div className="mt-3 p-2 bg-gray-50 border border-gray-200 rounded">
                <div className="flex items-center justify-between"><p className="text-gray-600 text-sm">無已知藥物過敏</p><button onClick={()=>setIsEditingAllergy(true)} className="text-blue-600 hover:bg-blue-100 p-1 rounded"><Edit3 size={14} /></button></div>
              </div>
            )}
            {isEditingAllergy&&(
              <div className="mt-3 p-3 bg-yellow-50 border border-yellow-200 rounded">
                <label className="block text-sm font-medium text-gray-700 mb-2">編輯藥物過敏史</label>
                <div className="flex space-x-2">
                  <input type="text" value={selectedPatientForMeds.drugAllergies||''} onChange={e=>setSelectedPatientForMeds(prev=>({...prev,drugAllergies:e.target.value}))} className="flex-1 p-2 border border-gray-300 rounded text-sm" placeholder="請輸入藥物過敏史，若無過敏請填寫「無已知過敏」" />
                  <button onClick={saveAllergy} className="bg-green-600 text-white px-3 py-2 rounded text-sm hover:bg-green-700">儲存</button>
                  <button onClick={()=>setIsEditingAllergy(false)} className="bg-gray-600 text-white px-3 py-2 rounded text-sm hover:bg-gray-700">取消</button>
                </div>
              </div>
            )}
          </div>
          <ErrorAlert />

          {editingMed&&(
            <div className="bg-white rounded-lg shadow-sm p-6 mb-4 border-l-4 border-green-500">
              <h4 className="font-semibold mb-4 text-gray-800">{isAddingMed?'新增藥物':'編輯藥物'}</h4>
              <div className="grid grid-cols-2 gap-4 mb-4">
                <div><label className="block text-sm font-medium text-gray-700 mb-1">藥物名稱 *</label><input type="text" value={editingMed.drugName} onChange={e=>updateMedicationField('drugName',e.target.value)} className="w-full p-2 border border-gray-300 rounded-md" placeholder="請輸入藥物名稱" /></div>
                <div><label className="block text-sm font-medium text-gray-700 mb-1">領立醫院 *</label><input type="text" value={editingMed.hospital} onChange={e=>updateMedicationField('hospital',e.target.value)} className="w-full p-2 border border-gray-300 rounded-md" placeholder="請輸入領立醫院" /></div>

                <div><label className="block text-sm font-medium text-gray-700 mb-1">顆數/瓶數</label><input type="number" value={editingMed.quantity} onChange={e=>updateMedicationField('quantity',parseInt(e.target.value)||0)} className="w-full p-2 border border-gray-300 rounded-md" /></div>

                <div><label className="block text-sm font-medium text-gray-700 mb-1">當月領立狀態</label><select value={editingMed.monthlyStatus} onChange={e=>updateMedicationField('monthlyStatus',e.target.value)} className="w-full p-2 border border-gray-300 rounded-md"><option value="prescribed">已領立 ✅</option><option value="remaining">有餘藥未領 🪣</option><option value="discontinued">停止領立 DC</option></select></div>
                <div><label className="block text-sm font-medium text-gray-700 mb-1">藥物分類</label><select value={editingMed.category||'dialysis'} onChange={e=>updateMedicationField('category',e.target.value)} className="w-full p-2 border border-gray-300 rounded-md"><option value="dialysis">洗腎用藥</option><option value="internal">內科用藥</option><option value="other">其他</option></select></div>

          {medications.length>0 ? (

  // ===== PATIENT LIST VIEW =====
  if (currentView==='patientList') {

          <div className="flex items-center justify-between p-4 pb-0">
            <button onClick={()=>setCurrentView('scanner')} className="text-blue-600 hover:bg-blue-50 p-2 rounded"><X size={20} /></button>

          <div className="flex border-t mt-3">

              {unit:'國際桃庚', activeTab:'border-blue-600 text-blue-700 bg-blue-50', activeBadge:'bg-blue-600 text-white'},

          {filteredPatients.length>0 ? (
            <div className="space-y-2">
              {filteredPatients.map(patient=>{
                const shiftColor = patient.shift==='早' ? 'bg-yellow-100 text-yellow-800' : patient.shift==='中' ? 'bg-green-100 text-green-800' : patient.shift==='晚' ? 'bg-indigo-100 text-indigo-800' : 'bg-gray-100 text-gray-600';

                const today = new Date().toISOString().split('T')[0];

                return (
                <div key={patient.patientId} className="bg-white rounded-lg shadow-sm p-4 border-l-4 border-blue-500">
                  <div className="flex items-center justify-between">
                    <div className="flex-1 cursor-pointer hover:bg-blue-50 p-2 rounded transition-colors" onClick={()=>handleSelectPatient(patient)}>
                      <div className="flex items-center space-x-2 flex-wrap gap-y-0.5">
                        <h3 className="font-semibold text-gray-800">{patient.name}</h3>
                        {patient.frequency&&<span className="text-xs bg-blue-50 text-blue-700 px-2 py-0.5 rounded">週{patient.frequency}次</span>}
                      </div>
                      <div className="mt-0.5 space-y-0.5 text-sm text-gray-600">
                        <div className="flex items-center flex-wrap gap-x-2 gap-y-0.5">
                          {patient.bed&&<span className="font-bold bg-gray-200 text-gray-700 px-2 py-0.5 rounded text-xs">{patient.bed}</span>}
                          {patient.shift&&<span className={`text-xs px-2 py-0.5 rounded font-medium ${shiftColor}`}>{qwLabel} {patient.shift}班</span>}
                        </div>
                        {(patient.accessType||patient.dw)&&<div className="flex items-center gap-x-3 text-xs text-gray-500 mt-0.5"><span>通路: {patient.accessSide}{patient.accessLocation} {patient.accessType}</span><span>乾重: {patient.dw||0}kg</span></div>}
                        {hasAllergy(patient.drugAllergies)&&<div className="flex items-center text-red-600 font-medium"><AlertCircle size={14} className="mr-1" />過敏: {patient.drugAllergies}</div>}
                        <div className="flex items-center space-x-3 text-xs">
                          {patient.medications&&patient.medications.length>0&&<span className="flex items-center text-blue-600"><Pill size={12} className="mr-1" />{patient.medications.length} 種藥</span>}
                          {patient.dialysisRecords&&patient.dialysisRecords.length>0&&<span className="flex items-center text-green-600"><Activity size={12} className="mr-1" />{patient.dialysisRecords.length} 次記錄</span>}
                          {hasTodayTodo&&<span className="flex items-center text-orange-500 font-medium"><Bell size={12} className="mr-1" />今日待辦</span>}
                          {patient.reminders&&patient.reminders.trim()&&<span className="flex items-center text-gray-400"><FileText size={12} className="mr-1" />有記事</span>}
                        </div>
                      </div>
                    </div>
                    <div className="flex flex-col space-y-1 ml-2">
                      <div className="flex space-x-1">
                        <button onClick={()=>handleMedicationManagement(patient)} className="p-2 text-purple-600 hover:bg-purple-50 rounded border border-purple-200" title="藥物管理"><Pill size={14} /></button>
                        <button onClick={()=>handleDialysisRecords(patient)} className="p-2 text-green-600 hover:bg-green-50 rounded border border-green-200" title="透析紀錄"><Activity size={14} /></button>
                      </div>
                      <div className="flex space-x-1">
                        <button onClick={()=>handleLabReport(patient)} className="p-2 text-teal-600 hover:bg-teal-50 rounded border border-teal-200" title="抽血報告"><TrendingUp size={14} /></button>
                        <button onClick={()=>handleReminders(patient)} className="p-2 text-orange-600 hover:bg-orange-50 rounded border border-orange-200" title="提醒事項"><Bell size={14} /></button>
                        <button onClick={()=>{setCurrentPatient(patient);setIsNewPatient(false);setCurrentView('background');}} className="p-2 text-blue-600 hover:bg-blue-50 rounded border border-blue-200" title="背景資料"><FileText size={14} /></button>
                      </div>
                    </div>
                  </div>
                </div>
                );
              })}
            </div>
          ) : (
            <div className="bg-white rounded-lg shadow-sm p-8 text-center">
              <Users className="text-gray-400 mx-auto mb-4" size={48} />
              <p className="text-gray-500 mb-2">{searchTerm?'找不到符合條件的病人':'目前沒有病人資料'}</p>
              {searchTerm&&<button onClick={()=>setSearchTerm('')} className="text-blue-600 hover:text-blue-800 text-sm">清除搜尋條件</button>}
            </div>
          )}

          <div className="mt-6 grid grid-cols-2 gap-3">
            <button onClick={()=>{ setCurrentPatient({ patientId:`P${Date.now().toString().slice(-6)}`, name:'', gender:'男', birthday:'', idNumber:'', frequency:3, duration:4, ak:'', dialysate:'', accessSide:'左', accessLocation:'前臂', accessType:'AVF', heparinDose:0, bloodFlow:0, dw:0, bloodType:'', chronicDiseases:'', drugAllergies:'', firstDialysisHospital:'', firstDialysisDate:'', medications:[], medicationHistory:{}, dialysisRecords:[], reminders:'' }); setIsNewPatient(true); setCurrentView('patient'); setHistory([]); }} className="bg-purple-600 text-white py-3 rounded-md hover:bg-purple-700 flex items-center justify-center">
              <User className="mr-2" size={20} />新增病人
            </button>
            <button onClick={()=>setCurrentView('scanner')} className="bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 flex items-center justify-center">
              <Camera className="mr-2" size={20} />掃描QR Code
            </button>
          </div>
        </div>
        </div>
      </div>
    );
  }

  // ===== LAB REPORT VIEW =====
  if (currentView==='labReport'&&selectedPatientForLab) {
    const allRecords = labData[selectedPatientForLab.name] || [];
    const LAB_REFS = {
      'URR':          { min:65,  label:'≥65%' },
      'Kt/V (Gotch)': { min:1.2, label:'≥1.2' },
      'K 鉀':         { min:3.5, max:5.5,  label:'3.5-5.5' },
      'P 磷':         { min:3.5, max:5.5,  label:'3.5-5.5' },
      'Ca 鈣':        { min:8.4, max:10.2, label:'8.4-10.2' },
      'Albumin':      { min:3.5, label:'≥3.5' },
      'Hb':           { min:10,  max:12,   label:'10-12' },
      'Hct':          { min:33,  max:36,   label:'33-36%' },
    };

    // 時間篩選
    const PERIODS = [
      { key:'3M', label:'3個月' }, { key:'6M', label:'6個月' },
      { key:'1Y', label:'1年' },   { key:'5Y', label:'5年' },
      { key:'all', label:'全部' },
    ];
    const filterRecords = (recs, period) => {
      if (period==='all' || !recs.length) return recs;
      const months = { '3M':3, '6M':6, '1Y':12, '5Y':60 }[period];
      const now = new Date();
      const cutoff = new Date(now.getFullYear(), now.getMonth()-months, 1);
      return recs.filter(r => {
        if (!r.yearMonth) return true;
        const [y,m] = r.yearMonth.split('-').map(Number);
        return new Date(y, m-1, 1) >= cutoff;
      });
    };
    const records = filterRecords(allRecords, labPeriodFilter);

    const checkRef = (item, val) => {
      const ref = LAB_REFS[item];
      if (!ref || !val || val==='-') return 'normal';
      const n = parseFloat(val);
      if (isNaN(n)) return 'normal';
      if (ref.min !== undefined && n < ref.min) return 'low';
      if (ref.max !== undefined && n > ref.max) return 'high';
      return 'normal';
    };
    const rowStatus = (item) => {
      const s = records.map(r => checkRef(item, r[item]||'-'));
      if (s.some(x=>x==='high')) return 'high';
      if (s.some(x=>x==='low'))  return 'low';
      return 'normal';
    };
    const allItems = allRecords.length > 0
      ? Object.keys(allRecords[0]).filter(k=>k!=='yearMonth'&&k!=='period'&&k!=='date')
      : [];

    // 展開面板：折線圖 + 數據清單
    const ExpandPanel = ({ item }) => {
      const pts = records.map(r=>({ ym:r.yearMonth, date:r.date, val:parseFloat(r[item]) })).filter(p=>!isNaN(p.val));
      const ref = LAB_REFS[item];
      if (pts.length === 0) return <p className="text-xs text-gray-400 py-2">此時段無資料</p>;
      const W=300, H=90, padL=28, padR=12, padT=16, padB=20;
      const vals = pts.map(p=>p.val);
      const refVals = [ref?.min, ref?.max].filter(v=>v!==undefined);
      const allVals = [...vals, ...refVals];
      const minV=Math.min(...allVals), maxV=Math.max(...allVals);
      const rangeV = maxV-minV || 1;
      const chartW = W-padL-padR, chartH = H-padT-padB;
      const cx = i => padL + (pts.length>1 ? (i/(pts.length-1))*chartW : chartW/2);
      const cy = v => padT + chartH - ((v-minV)/rangeV)*chartH;
      return (
        <div className="mt-1 pb-2">
          {/* 折線圖 */}
          <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
            {/* 參考範圍色帶 */}
            {ref?.min!==undefined&&ref?.max!==undefined&&(
              <rect x={padL} y={cy(ref.max)} width={chartW} height={cy(ref.min)-cy(ref.max)} fill="#dcfce7" opacity="0.5"/>
            )}
            {/* 參考線 */}
            {ref?.min!==undefined&&<line x1={padL} x2={W-padR} y1={cy(ref.min)} y2={cy(ref.min)} stroke="#86efac" strokeWidth="1" strokeDasharray="3,2"/>}
            {ref?.max!==undefined&&<line x1={padL} x2={W-padR} y1={cy(ref.max)} y2={cy(ref.max)} stroke="#86efac" strokeWidth="1" strokeDasharray="3,2"/>}
            {/* 折線 */}
            {pts.length>1&&<polyline fill="none" stroke="#0ea5e9" strokeWidth="2"
              points={pts.map((p,i)=>`${cx(i)},${cy(p.val)}`).join(' ')}/>}
            {/* 點 + 數值 + 日期 */}
            {pts.map((p,i)=>{
              const s=checkRef(item,String(p.val));
              const dotColor = s==='low'?'#3b82f6':s==='high'?'#f97316':'#0ea5e9';
              return (
                <g key={i}>
                  <circle cx={cx(i)} cy={cy(p.val)} r="4" fill={dotColor}/>
                  <text x={cx(i)} y={cy(p.val)-6} textAnchor="middle" fontSize="9" fill="#374151" fontWeight="600">{p.val}</text>
                  <text x={cx(i)} y={H-3} textAnchor="middle" fontSize="7.5" fill="#9ca3af">{p.ym?.slice(5)||p.date}</text>
                </g>
              );
            })}
            {/* Y軸參考標 */}
            {ref?.min!==undefined&&<text x={padL-2} y={cy(ref.min)+3} textAnchor="end" fontSize="7" fill="#86efac">{ref.min}</text>}
            {ref?.max!==undefined&&<text x={padL-2} y={cy(ref.max)+3} textAnchor="end" fontSize="7" fill="#86efac">{ref.max}</text>}
          </svg>
          {/* 數據清單 */}
          <div className="flex flex-wrap gap-2 mt-1 px-1">
            {[...pts].reverse().map((p,i)=>{
              const s=checkRef(item,String(p.val));
              return (
                <span key={i} className={`text-xs px-2 py-0.5 rounded-full font-bold ${s==='low'?'bg-blue-200 text-blue-900':s==='high'?'bg-orange-200 text-orange-900':'bg-gray-100 text-gray-600'}`}>
                  {p.ym||p.date} · {p.val}
                </span>
              );
            })}
          </div>
        </div>
      );
    };

    return (
      <div className="min-h-screen bg-gray-50">
        <div className="bg-white shadow-sm border-b p-4">
          <div className="flex items-center justify-between">
            <button onClick={()=>{setCurrentView('patientList');setExpandedLabItem(null);}} className="text-blue-600 hover:bg-blue-50 p-2 rounded"><X size={20} /></button>
            <div className="text-center">
              <h1 className="text-lg font-semibold">抽血報告</h1>
              <p className="text-sm text-gray-500">{selectedPatientForLab.name}</p>
            </div>
            <div className="w-10" />
          </div>
        </div>
        <div className="p-4 max-w-2xl mx-auto">
          {/* 時間篩選 */}
          <div className="flex space-x-2 mb-3">
            {PERIODS.map(p=>(
              <button key={p.key} onClick={()=>{setLabPeriodFilter(p.key);setExpandedLabItem(null);}}
                className={`flex-1 py-1.5 rounded-lg text-xs font-medium transition-colors ${labPeriodFilter===p.key?'bg-teal-600 text-white':'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`}>
                {p.label}
              </button>
            ))}
          </div>
          {allRecords.length === 0 ? (
            <div className="bg-white rounded-lg shadow-sm p-8 text-center">
              <TrendingUp className="text-gray-300 mx-auto mb-4" size={48} />
              <p className="text-gray-500">此病人目前無抽血資料</p>
            </div>
          ) : records.length === 0 ? (
            <div className="bg-white rounded-lg shadow-sm p-8 text-center">
              <p className="text-gray-500">此時段無資料</p>
              <button onClick={()=>setLabPeriodFilter('all')} className="mt-2 text-teal-600 text-sm">顯示全部</button>
            </div>
          ) : (
            <div className="bg-white rounded-lg shadow-sm overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead className="bg-gray-50 border-b">
                    <tr>
                      <th className="text-left py-2 px-3 font-medium text-gray-600 w-32">項目</th>
                      {records.map((rec,i)=>(
                        <th key={i} className="text-center py-2 px-2 font-medium text-gray-600 min-w-14">
                          <div className="text-xs">{rec.yearMonth||rec.period}</div>
                          <div className="text-xs text-gray-400">{rec.date}</div>
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {allItems.map((item,idx)=>{
                      const rs = rowStatus(item);
                      const rowBg = rs==='low' ?'bg-blue-100':rs==='high'?'bg-orange-100':idx%2===0?'bg-white':'bg-gray-50';
                      const isExp = expandedLabItem===item;
                      return (
                        <React.Fragment key={item}>
                          <tr className={`${rowBg} cursor-pointer active:opacity-70`}
                            onClick={()=>setExpandedLabItem(isExp?null:item)}>
                            <td className={`py-2 px-3 font-medium text-xs border-l-4 ${rs==='low'?'text-blue-900 border-blue-500':rs==='high'?'text-orange-900 border-orange-500':'text-gray-700 border-transparent'}`}>
                              <div className="flex items-center justify-between">
                                <span className={rs!=='normal'?'font-bold':''}>{item}{rs==='low'?' ↓':rs==='high'?' ↑':''}</span>
                                <span className="text-gray-300 ml-1">{isExp?'▲':'▼'}</span>
                              </div>
                              {LAB_REFS[item]&&<span className={`font-normal ${rs==='low'?'text-blue-600':rs==='high'?'text-orange-600':'text-gray-400'}`}>{LAB_REFS[item].label}</span>}
                            </td>
                            {records.map((rec,ri)=>(
                              <td key={ri} className={`text-center py-2 px-2 text-sm font-bold ${rs==='low'?'text-blue-800':rs==='high'?'text-orange-800':'text-gray-800 font-semibold'}`}>
                                {rec[item]||'-'}
                              </td>
                            ))}
                          </tr>
                          {isExp&&(
                            <tr className="bg-gray-50">
                              <td colSpan={records.length+1} className="px-3 border-b border-gray-100">
                                <ExpandPanel item={item} />
                              </td>
                            </tr>
                          )}
                        </React.Fragment>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div className="p-2 border-t bg-gray-50 text-xs text-gray-400 flex space-x-3">
                <span><span className="inline-block w-2.5 h-2.5 bg-blue-400 rounded mr-1"></span>偏低 ↓</span>
                <span><span className="inline-block w-2.5 h-2.5 bg-orange-400 rounded mr-1"></span>偏高 ↑</span>
                <span><span className="inline-block w-2.5 h-2.5 bg-green-100 rounded mr-1"></span>正常範圍</span>
                <span>點列展開趨勢圖</span>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ===== PATIENT VIEW =====
  if (currentView==='patient'&&currentPatient) {
    return (
      <div className="min-h-screen bg-gray-50">
        <div className="bg-white shadow-sm border-b p-4">
          <div className="flex items-center justify-between">
            <button onClick={()=>setCurrentView('patientList')} className="text-blue-600 hover:bg-blue-50 p-2 rounded"><X size={20} /></button>
            <div className="text-center"><h1 className="text-lg font-semibold">{isNewPatient?'新增病人':currentPatient.name}</h1><ConnectionStatus /></div>
            <div className="flex space-x-2">
              {!isNewPatient&&<>
                <button onClick={()=>{ setSelectedPatientForMeds(currentPatient); setCurrentView('medications'); }} className="text-purple-600 hover:bg-purple-50 p-2 rounded" title="藥物管理"><Pill size={20} /></button>
                <button onClick={()=>setCurrentView('background')} className="text-gray-600 hover:bg-gray-50 p-2 rounded" title="背景資料"><FileText size={20} /></button>
                <button onClick={()=>setCurrentView('history')} className="text-gray-600 hover:bg-gray-50 p-2 rounded" title="歷史紀錄"><History size={20} /></button>
                <button onClick={handleExport} className="text-gray-600 hover:bg-gray-50 p-2 rounded" title="匯出資料"><Download size={20} /></button>
              </>}
            </div>
          </div>
        </div>
        <div className="p-4 max-w-md mx-auto">
          <ErrorAlert />
          {isNewPatient&&<div className="bg-blue-50 border border-blue-200 rounded-md p-4 mb-6"><div className="flex items-center"><User className="text-blue-500 mr-2" size={20} /><span className="text-blue-700 font-medium">正在建立新病人資料</span></div><p className="text-blue-600 text-sm mt-1">請填寫完整的病人資訊</p></div>}
          <div className="bg-white rounded-lg shadow-sm p-6 mb-6">
            <h3 className="text-lg font-semibold mb-4 text-gray-800">基本資料</h3>
            <EditableField label="病歷號" field="patientId" value={currentPatient.patientId} type="text" disabled={!isNewPatient} />
            <EditableField label="姓名" field="name" value={currentPatient.name} />
            <EditableField label="性別" field="gender" value={currentPatient.gender} options={['男','女']} />
            <EditableField label="生日" field="birthday" value={currentPatient.birthday} type="date" />
            <EditableField label="身份證字號" field="idNumber" value={currentPatient.idNumber} />
          </div>
          <div className="bg-white rounded-lg shadow-sm p-6 mb-6">
            <h3 className="text-lg font-semibold mb-4 text-gray-800">透析設定</h3>
            <EditableField label="頻率 (次/週)" field="frequency" value={currentPatient.frequency||3} type="number" />
            <EditableField label="時間 (小時)" field="duration" value={currentPatient.duration||4} type="number" />
            <EditableField label="人工腎臟型號" field="ak" value={currentPatient.ak||''} />
            <EditableField label="透析液" field="dialysate" value={currentPatient.dialysate||''} />
            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-700 mb-2">血管通路</label>
              <div className="grid grid-cols-3 gap-2">
                <EditableField label="左/右" field="accessSide" value={currentPatient.accessSide||'左'} options={['左','右']} />
                <EditableField label="部位" field="accessLocation" value={currentPatient.accessLocation||'前臂'} options={['前臂','上臂','肩部']} />
                <EditableField label="類型" field="accessType" value={currentPatient.accessType||'AVF'} options={['AVF','AVG','Permcath']} />
              </div>
            </div>
            <EditableField label="肝素劑量 (IU)" field="heparinDose" value={currentPatient.heparinDose||0} type="number" />
            <EditableField label="血流量 (ml/min)" field="bloodFlow" value={currentPatient.bloodFlow||0} type="number" />
            <EditableField label="乾體重 (kg)" field="dw" value={currentPatient.dw||0} type="number" />
          </div>
          {isNewPatient ? (
            <button onClick={handleCreatePatient} disabled={loading} className="w-full bg-green-600 text-white py-3 rounded-md hover:bg-green-700 flex items-center justify-center disabled:bg-gray-400">
              <User className="mr-2" size={20} />{loading?'建立中...':'建立病人資料'}
            </button>
          ) : (
            <button onClick={handleSave} disabled={loading} className="w-full bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 flex items-center justify-center disabled:bg-gray-400">
              <Save className="mr-2" size={20} />{loading?'儲存中...':'儲存變更'}
            </button>
          )}
        </div>
      </div>
    );
  }

  // ===== BACKGROUND VIEW =====
  if (currentView==='background'&&currentPatient) {
    return (
      <div className="min-h-screen bg-gray-50">
        <div className="bg-white shadow-sm border-b p-4">
          <div className="flex items-center justify-between">
            <button onClick={()=>setCurrentView('patient')} className="text-blue-600 hover:bg-blue-50 p-2 rounded"><X size={20} /></button>
            <div className="text-center"><h1 className="text-lg font-semibold">背景資料</h1><ConnectionStatus /></div>
            <div></div>
          </div>
        </div>
        <div className="p-4 max-w-md mx-auto">
          <div className="bg-white rounded-lg shadow-sm p-4 mb-4"><h3 className="font-semibold mb-2">{currentPatient.name} ({currentPatient.patientId})</h3></div>
          <ErrorAlert />
          <div className="bg-white rounded-lg shadow-sm p-6 mb-6">
            <h3 className="text-lg font-semibold mb-4 text-gray-800 flex items-center"><FileText className="mr-2 text-blue-600" size={20} />醫療背景資料</h3>
            <EditableField label="血型" field="bloodType" value={currentPatient.bloodType||''} options={['A+','A-','B+','B-','AB+','AB-','O+','O-']} />
            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-700 mb-1">慢性疾病</label>
              <div className="flex items-center">
                {editingField==='chronicDiseases' ? (
                  <div className="flex items-center w-full">
                    <textarea value={currentPatient.chronicDiseases||''} onChange={e=>updateField('chronicDiseases',e.target.value)} className="flex-1 p-2 border border-gray-300 rounded-md resize-none" rows="3" placeholder="請輸入慢性疾病，以逗號分隔" />
                    <button onClick={()=>setEditingField(null)} className="ml-2 p-2 text-green-600 hover:bg-green-50 rounded"><Check size={16} /></button>
                  </div>
                ) : (
                  <div className="flex items-center w-full">
                    <span className="flex-1 p-2 rounded-md bg-gray-50 min-h-10 whitespace-pre-wrap">{currentPatient.chronicDiseases||'N/A'}</span>
                    <button onClick={()=>setEditingField('chronicDiseases')} className="ml-2 p-2 text-blue-600 hover:bg-blue-50 rounded"><Edit3 size={16} /></button>
                  </div>
                )}
              </div>
            </div>
            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-700 mb-1">藥物過敏史</label>
              {editingField==='drugAllergies' ? (
                <div className="space-y-2">
                  <div className="flex space-x-4">
                    <label className="flex items-center space-x-2 cursor-pointer">
                      <input type="radio" name="allergy" checked={!hasAllergy(currentPatient.drugAllergies)} onChange={()=>updateField('drugAllergies','nil')} />
                      <span className="text-sm font-medium text-gray-700">Nil（無過敏史）</span>
                    </label>
                    <label className="flex items-center space-x-2 cursor-pointer">
                      <input type="radio" name="allergy" checked={hasAllergy(currentPatient.drugAllergies)} onChange={()=>updateField('drugAllergies','')} />
                      <span className="text-sm font-medium text-gray-700">有過敏藥物</span>
                    </label>
                  </div>
                  {hasAllergy(currentPatient.drugAllergies)&&(
                    <input type="text" value={currentPatient.drugAllergies} onChange={e=>updateField('drugAllergies',e.target.value)} className="w-full p-2 border border-gray-300 rounded-md text-sm" placeholder="請輸入過敏藥物名稱（例：盤尼西林）" autoFocus />
                  )}
                  <button onClick={()=>setEditingField(null)} className="bg-green-600 text-white px-4 py-1.5 rounded text-sm hover:bg-green-700">確認</button>
                </div>
              ) : (
                <div className="flex items-center">
                  <span className={`flex-1 p-2 rounded-md bg-gray-50 ${hasAllergy(currentPatient.drugAllergies)?'text-red-600 font-medium':'text-gray-500'}`}>
                    {hasAllergy(currentPatient.drugAllergies) ? currentPatient.drugAllergies : 'Nil（無過敏史）'}
                  </span>
                  <button onClick={()=>setEditingField('drugAllergies')} className="ml-2 p-2 text-blue-600 hover:bg-blue-50 rounded"><Edit3 size={16} /></button>
                </div>
              )}
              {hasAllergy(currentPatient.drugAllergies)&&<div className="mt-2 p-2 bg-red-50 border border-red-200 rounded"><p className="text-red-700 text-sm font-medium">⚠️ 注意：此病人有藥物過敏史</p></div>}
            </div>
            <EditableField label="首次透析院所" field="firstDialysisHospital" value={currentPatient.firstDialysisHospital||''} />
            <div className="mb-4">
              <label className="block text-sm font-medium text-gray-700 mb-1">首次透析時間</label>
              <div className="flex items-center">
                {editingField==='firstDialysisDate' ? (
                  <div className="flex items-center w-full space-x-2">
                    <input type="date" value={currentPatient.firstDialysisDate||''} onChange={e=>updateField('firstDialysisDate',e.target.value)} className="flex-1 p-2 border border-gray-300 rounded-md" />
                    {currentPatient.firstDialysisDate&&<span className="text-sm text-gray-500 whitespace-nowrap">（{toMinguo(currentPatient.firstDialysisDate)}）</span>}
                    <button onClick={()=>setEditingField(null)} className="p-2 text-green-600 hover:bg-green-50 rounded"><Check size={16} /></button>
                  </div>
                ) : (
                  <div className="flex items-center w-full">
                    <span className="flex-1 p-2 rounded-md bg-gray-50">
                      {currentPatient.firstDialysisDate ? `${currentPatient.firstDialysisDate}（${toMinguo(currentPatient.firstDialysisDate)}）` : 'N/A'}
                    </span>
                    <button onClick={()=>setEditingField('firstDialysisDate')} className="ml-2 p-2 text-blue-600 hover:bg-blue-50 rounded"><Edit3 size={16} /></button>
                  </div>
                )}
              </div>
            </div>
            {currentPatient.firstDialysisDate&&(
              <div className="mt-4 p-3 bg-blue-50 border border-blue-200 rounded">
                <p className="text-blue-700 text-sm"><strong>透析年資：</strong>{(()=>{ const s=new Date(currentPatient.firstDialysisDate); const c=new Date(); const y=Math.floor((c-s)/(365.25*24*60*60*1000)); const m=Math.floor(((c-s)%(365.25*24*60*60*1000))/(30.44*24*60*60*1000)); return `約 ${y} 年 ${m} 個月`; })()}</p>
              </div>
            )}
          </div>
          <div className="flex space-x-3 mb-6">
            <button onClick={handleSave} disabled={loading} className="flex-1 bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 flex items-center justify-center disabled:bg-gray-400"><Save className="mr-2" size={20} />{loading?'儲存中...':'儲存背景資料'}</button>
            <button onClick={editMedicationFromBackground} className="bg-purple-600 text-white py-3 px-4 rounded-md hover:bg-purple-700 flex items-center justify-center"><Pill className="mr-2" size={20} />藥物管理</button>
          </div>
        </div>
      </div>
    );
  }

  // ===== HISTORY VIEW =====
  if (currentView==='history'&&currentPatient) {
    return (
      <div className="min-h-screen bg-gray-50">
        <div className="bg-white shadow-sm border-b p-4">
          <div className="flex items-center justify-between">
            <button onClick={()=>setCurrentView('patient')} className="text-blue-600 hover:bg-blue-50 p-2 rounded"><X size={20} /></button>
            <div className="text-center"><h1 className="text-lg font-semibold">歷史紀錄</h1><ConnectionStatus /></div>
            <div></div>
          </div>
        </div>
        <div className="p-4 max-w-md mx-auto">
          <div className="bg-white rounded-lg shadow-sm p-4 mb-4"><h3 className="font-semibold mb-2">{currentPatient.name} ({currentPatient.patientId})</h3></div>
          {history.length>0 ? (
            <div className="space-y-3">
              {history.map((record,index)=>(
                <div key={index} className="bg-white rounded-lg shadow-sm p-4">
                  <div className="flex justify-between items-center mb-3">
                    <div><span className="font-medium text-gray-800">{record.date}</span><span className="text-sm text-gray-500 ml-2">{record.time}</span></div>
                    <span className="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded">{record.operator}</span>
                  </div>
                  <div className="space-y-2">
                    {Object.entries(record.changes).map(([field,change])=>(
                      <div key={field} className="text-sm bg-gray-50 p-2 rounded">
                        <span className="font-medium text-gray-700">{fieldNames[field]||field}:</span>
                        <span className="text-red-600 line-through ml-2">{change.old}</span>
                        <span className="text-green-600 ml-2">→ {change.new}</span>
                      </div>
                    ))}
                  </div>
                  {record.notes&&<div className="mt-2 text-xs text-gray-600">備註: {record.notes}</div>}
                </div>
              ))}
            </div>
          ) : (
            <div className="bg-white rounded-lg shadow-sm p-8 text-center"><History className="text-gray-400 mx-auto mb-2" size={48} /><p className="text-gray-500">暫無歷史紀錄</p></div>
          )}
        </div>
      </div>
    );
  }

  return null;
};

createRoot(document.getElementById('root')).render(<DialysisPatientSystem />);
</script>
</body>
</html>
